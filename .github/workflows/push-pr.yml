on:
    push:
      branches:
        - main
        - "release/**"
      paths:
        - "src/**"
    pull_request:
      branches:
        - main
        - "release/**"

jobs:
     test:
          runs-on: ubuntu-latest
          steps:
            - name: Checkout repo
              uses: actions/checkout@v7.0.0
            - name: run test
              run: npm test